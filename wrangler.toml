# Cloudflare Workers Configuration
# ============================================================
# Deployment: wrangler deploy
# Local dev:  wrangler dev
# ============================================================

name = "wp-og-redirect"
main = "worker.js"
compatibility_date = "2024-01-01"

# ─── ENVIRONMENT VARIABLES ───────────────────────────────────
# Inhe seedha yahan set karo ya `wrangler secret put` se securely set karo
[vars]
# WordPress WPGraphQL plugin ka endpoint
GRAPHQL_ENDPOINT = ""
WP_BASE_URL = ""
FALLBACK_IMAGE = ""
# Vercel Panel Deployment URL (Required if using Workers to redirect short IDs)
VERCEL_APP_URL = ""

# Cloudflare R2 configurations (Required for image upload feature)
R2_ACCESS_KEY_ID = "56fa58e62e16aa5979a5a47a7c180cc0"
R2_SECRET_ACCESS_KEY = "bdb491647c29eff4eca38d31a09c21901a964dbcfdab39df1439e9e352260d2a"
R2_ENDPOINT = "https://e5ec0ac881346d2283cbac612ff95607.r2.cloudflarestorage.com"
R2_BUCKET_NAME = "YOUR_R2_BUCKET_NAME"
# R2 Bucket ko publicly access karne ka domain URL (Cloudflare dashboard -> R2 -> Bucket -> Settings -> Public Access)
R2_PUBLIC_URL = "https://your-public-r2-domain.com"

# ─── ROUTES (Optional) ───────────────────────────────────────
# [[routes]]
# pattern = "yourdomain.com/*"
# zone_name = "yourdomain.com"

# ─── PRODUCTION ENVIRONMENT ──────────────────────────────────
[env.production]
name = "wp-og-redirect-prod"

[env.production.vars]
GRAPHQL_ENDPOINT = ""
WP_BASE_URL = ""
FALLBACK_IMAGE = ""
VERCEL_APP_URL = ""
R2_ACCESS_KEY_ID = "56fa58e62e16aa5979a5a47a7c180cc0"
R2_SECRET_ACCESS_KEY = "bdb491647c29eff4eca38d31a09c21901a964dbcfdab39df1439e9e352260d2a"
R2_ENDPOINT = "https://e5ec0ac881346d2283cbac612ff95607.r2.cloudflarestorage.com"
R2_BUCKET_NAME = "YOUR_R2_BUCKET_NAME"
R2_PUBLIC_URL = "https://your-public-r2-domain.com"
